@if (isAddingTask) {
    <!--<app-add-task (cancel)="isAddingTask = false" (save)="isAddingTask = false" /> -->
    <app-new-task [userId]="userId" (close)="onCloseAddTask()" />
}

<section id="tasks">
    <header><h2>{{ name }}</h2>
    <menu>
        <button (click)="onStartAddTask()">Add Task</button>
    </menu>
    </header>

    <ul>
        @for ( task of selectedUserTasks; track task.id ) {
        <li>
            <app-task [task]="task" (complete)="onCompleteTask($event)" />
        </li>
        }
    </ul>
</section>
